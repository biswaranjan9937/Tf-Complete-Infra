name: Terraform Plan and Apply

on:
  pull_request:
    types: [opened, synchronize, reopened, closed] 
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'modules/**'        

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  actions: read

env:
  TFVAR_NAME: ${{vars.TFVAR_NAME }}
  BRANCH_NAME: ${{ vars.BRANCH_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  ROLE_TO_ASSUME: ${{ vars.ROLE_TO_ASSUME }}
  AWS_SESSION_NAME: ${{ vars.AWS_SESSION_NAME }}
  INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
  INFRACOST_REPORT_BUCKET: ${{ vars.INFRACOST_REPORT_BUCKET }}
  CHECKOV_REPORT_BUCKET: ${{ vars.CHECKOV_REPORT_BUCKET }}

jobs:
  plan:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged != true }}
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-${{ github.workflow }}-${{ github.ref }}-${{'global' }}
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials (Role Assumption)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          role-session-name: ${{ env.AWS_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Detect Branch and Set tfvars & Workspace
        id: detect_branch
        run: |
          BRANCH="${{ github.base_ref || github.event.pull_request.base.ref }}"
          echo "Branch is: $BRANCH"

          if [ "$BRANCH" == "${BRANCH_NAME}" ]; then
            echo "tfvars=${TFVAR_NAME}" >> $GITHUB_OUTPUT
            echo "workspace=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          else
            echo "Branch not recognized! Exiting."
            exit 1
          fi
      # - name: Get Instance Profile ARN
      #   id: get-arn
      #   run: |
      #     PROFILE_ARN=$(aws iam list-instance-profiles-for-role \
      #       --role-name Instance-Profile-Role \
      #       --query 'InstanceProfiles[0].Arn' \
      #       --output text)
      #     # Extract name from ARN
      #     PROFILE_NAME=$(echo $PROFILE_ARN | cut -d'/' -f2)
      #     echo "profile_arn=$PROFILE_ARN" >> $GITHUB_OUTPUT
      #     echo "profile_name=$PROFILE_NAME" >> $GITHUB_OUTPUT
      #     echo "Instance Profile ARN: $PROFILE_ARN"
      #     echo "Instance Profile Name: $PROFILE_NAME"
 
      # - name: Use the ARN
      #   run: |
      #     echo "ARN is: ${{ steps.get-arn.outputs.profile_name }}"

      - name: Terraform Init
        run: |
          terraform init -input=false -no-color

      - name: Select or Create Workspace
        run: terraform workspace select "${{ steps.detect_branch.outputs.workspace }}" || terraform workspace new "${{ steps.detect_branch.outputs.workspace }}"

      - name: Terraform Validate
        id: init-validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          # Ensure root-level summaries directory exists
          mkdir -p "${{ github.workspace }}/.plan_summaries/"
          # Capture both stdout and stderr, then tee into a file
          terraform plan -lock=false -no-color \
            -var-file="${{ steps.detect_branch.outputs.tfvars }}" \
            2>&1 \
            | tee "${{ github.workspace }}/.plan_summaries/plan-output.txt"

      - name: Comment Terraform Plan Summary on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_FILE_PATH: ${{ github.workspace }}/.plan_summaries/plan-output.txt
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = process.env.PLAN_FILE_PATH;
            let planOutput = 'Plan file not found.';
            if (fs.existsSync(path)) {
              planOutput = fs.readFileSync(path, 'utf8');
              if (planOutput.length > 65000) {
                planOutput = planOutput.slice(0, 65000) + "\n\n...Output truncated...";
              }
            }
            const commentBody = `
            ###  Terraform Plan Summary 

            ####  Init: ${{ steps.init-validate.outcome }}
            ####  Validate: ${{ steps.init-validate.outcome }}
            ####  Plan: ${{ steps.plan.outcome }}

            <details><summary> Show Terraform Plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            ---
            
             *Triggered by: @${{ github.actor }} using \`${{ github.event_name }}\`*
            `;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Generate Terraform Plan Binary
        run: terraform plan -out tfplan.binary -var-file="${{ steps.detect_branch.outputs.tfvars }}" -lock=false

      - name: Convert Plan to JSON
        run: terraform show -json tfplan.binary | jq > tfplan.json

      # -----------------------------
      # Checkov
      # -----------------------------
      - name: Install Checkov
        run: |
          sudo apt install pipx -y
          pipx install checkov
          pipx ensurepath

      - name: Generate Checkov scanned Report
        run: checkov -f tfplan.json --soft-fail

      - name: Generate Checkov JSON report for S3 upload
        run: checkov -f tfplan.json -o json --soft-fail > report.json

      - name: Generate HTML Report
        run: python3 scripts/generate_html.py

      # -----------------------------
      # Upload Checkov scanned report to S3
      # -----------------------------
      - name: Upload Checkov HTML to S3
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          aws s3 cp report.html s3://$CHECKOV_REPORT_BUCKET/reports/checkov-report-${TIMESTAMP}.html

      # -----------------------------
      # Infracost
      # -----------------------------
      - name: Install Infracost
        run: | 
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          infracost --version

      - name: Configure Infracost API Key
        run: infracost configure set api_key ${{ env.INFRACOST_API_KEY }}

      - name: Generate Infracost Breakdown
        run: infracost breakdown --path tfplan.json --format json --out-file cost.json

      - name: Generate Infracost Summary
        run: infracost breakdown --path tfplan.json

      - name: Generate Infracost HTML Report
        run: infracost output --path cost.json --format html --out-file report.html

      # -----------------------------
      # Upload infracost report to S3
      # -----------------------------
      - name: Upload Report to S3
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          aws s3 cp report.html s3://$INFRACOST_REPORT_BUCKET/infracost-reports/report-${TIMESTAMP}.html

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: '${{ github.event.pull_request.base.ref }}'

      - name: Generate Infracost cost estimate baseline
        run: |
          infracost breakdown --path=. \
                              --format=json \
                              --out-file=/tmp/infracost-base.json

      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Generate Infracost diff
        run: |
          infracost diff --path=. \
                          --format=json \
                          --compare-to=/tmp/infracost-base.json \
                          --out-file=/tmp/infracost.json

      - name: Post Infracost comment
        continue-on-error: true
        run: |
          infracost comment github --path=/tmp/infracost.json \
                                  --repo=$GITHUB_REPOSITORY \
                                  --github-token=${{ github.token }} \
                                  --pull-request=${{ github.event.pull_request.number }} \
                                  --behavior=update

  on-pr-merge:
    if: ${{ github.event.pull_request.merged == true && github.event.action == 'closed' }}
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-${{ github.workflow }}-${{ github.ref }}-${{'global' }}
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials (Role Assumption)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          role-session-name: ${{ env.AWS_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Detect Branch and Set tfvars & Workspace
        id: detect_branch
        run: |
          BRANCH="${{ github.base_ref || github.event.pull_request.base.ref }}"
          echo "Branch is: $BRANCH"

          if [ "$BRANCH" == "${BRANCH_NAME}" ]; then
            echo "tfvars=${TFVAR_NAME}" >> $GITHUB_OUTPUT
            echo "workspace=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          else
            echo "Branch not recognized! Exiting."
            exit 1
          fi
      # - name: Get Instance Profile ARN
      #   id: get-arn
      #   run: |
      #     PROFILE_ARN=$(aws iam list-instance-profiles-for-role \
      #       --role-name Instance-Profile-Role \
      #       --query 'InstanceProfiles[0].Arn' \
      #       --output text)
      #     # Extract name from ARN
      #     PROFILE_NAME=$(echo $PROFILE_ARN | cut -d'/' -f2)
      #     echo "profile_arn=$PROFILE_ARN" >> $GITHUB_OUTPUT
      #     echo "profile_name=$PROFILE_NAME" >> $GITHUB_OUTPUT
      #     echo "Instance Profile ARN: $PROFILE_ARN"
      #     echo "Instance Profile Name: $PROFILE_NAME"

      - name: Terraform Init
        run: |
          terraform init -input=false -no-color

      - name: Select or Create Workspace
        run: terraform workspace select "${{ steps.detect_branch.outputs.workspace }}" || terraform workspace new "${{ steps.detect_branch.outputs.workspace }}"

      - name: Terraform Apply
        run: |
          echo "Running Terraform apply in folder"
          terraform apply -auto-approve -var-file="${{ steps.detect_branch.outputs.tfvars }}" -lock=false

      # - name: Get AWS Credentials
      #   id: aws_creds
      #   run: |
      #     ACCESS_KEY=$(terraform output -raw uat_access_key_id)
      #     SECRET_KEY=$(terraform output -raw uat_secret_access_key)
      #     # echo "::add-mask::$SECRET_KEY"
      #     echo "access_key=$ACCESS_KEY" >> $GITHUB_OUTPUT
      #     echo "secret_key=$SECRET_KEY" >> $GITHUB_OUTPUT

      # - name: Use credentials
      #   run: |
      #     echo "Access Key: ${{ steps.aws_creds.outputs.access_key }}"
      #     echo "Secret Key: ${{ steps.aws_creds.outputs.secret_key }}"

      # -----------------------------
      # Runbook — Console Screenshots
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Extract resources from Terraform state
        run: npm run extract

      - name: Build AWS Console URLs
        run: npm run map

      - name: Capture AWS Console screenshots
        run: npm run screenshots

      - name: Verify screenshots
        run: |
          count=$(find screenshots -maxdepth 1 -type f -name '*.png' | wc -l)
          echo "Screenshots captured: ${count}"
          [ "${count}" -gt 0 ] || { echo "No screenshots generated."; exit 1; }

      - name: Generate runbook
        run: npm run runbook

      - name: Upload runbook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aws-console-runbook
          path: |
            screenshots/
            runbook.md
            resources.json
            console-urls.json
          if-no-files-found: error

      - name: Commit runbook and screenshots to main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add screenshots/ runbook.md resources.json console-urls.json || true
          git diff --staged --quiet || git commit -m "📸 Update runbook screenshots [skip ci]" || true
          git push || true
